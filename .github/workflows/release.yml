name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write # create the GitHub release
  id-token: write # required for attestation signing (OIDC)
  attestations: write # store the build provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build provenance attestations for release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release with attested assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "Automated release. Release assets carry GitHub build-provenance attestations (verify with: gh attestation verify <file> --repo $GITHUB_REPOSITORY)." \
            main.js manifest.json styles.css
